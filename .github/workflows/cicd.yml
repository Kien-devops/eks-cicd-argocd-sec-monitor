name: DevSecOps CI/CD

on:
  push:
    branches:
      - main
      - devops
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"
  BACKEND_PROJECT: hospital_BE/Hospital_API/Hospital_API.csproj
  FRONTEND_DIR: hospital_FE
  REPO_DIR: /home/ubuntu/eks-cicd-argocd-sec-monitor
  REPO_URL: https://github.com/Kien-devops/eks-cicd-argocd-sec-monitor.git
  REGISTRY: 606030503959.dkr.ecr.us-east-1.amazonaws.com
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}
  BRANCH_NAME: ${{ github.ref_name }}
  FE_MANIFEST: k8s/base/05-fe-deployment.yaml
  BE_MANIFEST: k8s/base/07-be-deployment.yaml
  TERRAFORM_DIR: terraform/environments/dev

jobs:
  iac-terraform-check:
    name: IaC Terraform and Kubernetes Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'ci: update image tag') }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Kubernetes manifest render
        run: kubectl kustomize k8s/base

  security-gates:
    name: Trivy and SonarQube Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - iac-terraform-check
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'ci: update image tag') }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore "${{ env.BACKEND_PROJECT }}"

      - name: SonarQube analysis
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "SonarQube secrets are not configured. Skipping analysis."
            dotnet build "${{ env.BACKEND_PROJECT }}" --configuration Release --no-restore
            exit 0
          fi

          dotnet tool install --global dotnet-sonarscanner
          export PATH="$PATH:$HOME/.dotnet/tools"

          dotnet sonarscanner begin \
            /k:"eks-cicd-argocd-sec-monitor" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.token="$SONAR_TOKEN"

          dotnet build "${{ env.BACKEND_PROJECT }}" --configuration Release --no-restore

          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: hospital_FE/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Lint frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

  build-push-deploy:
    name: Build, Push ECR, and Update GitOps
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - security-gates
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'ci: update image tag') }}"

    steps:
      - name: Nexus repository check
        shell: bash
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
        run: |
          set -euo pipefail

          if [ -z "${NEXUS_URL:-}" ]; then
            echo "NEXUS_URL is not configured. Skipping Nexus check."
            exit 0
          fi

          curl -fsS "$NEXUS_URL/service/rest/v1/status" >/dev/null

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/ec2_key
          printf '%s' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          printf '%s\n' "${{ secrets.EC2_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Build and push images on EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          set -euo pipefail

          GIT_AUTH=$(printf '%s' "${GIT_USERNAME}:${GIT_PASSWORD}" | base64 | tr -d '\n')

          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=yes \
            "ubuntu@${EC2_HOST}" \
            "GIT_AUTH='${GIT_AUTH}' REPO_DIR='${REPO_DIR}' REPO_URL='${REPO_URL}' REGISTRY='${REGISTRY}' AWS_REGION='${AWS_REGION}' IMAGE_TAG='${IMAGE_TAG}' BRANCH_NAME='${BRANCH_NAME}' /bin/bash -s" <<'EOF'
          set -euo pipefail

          command -v aws >/dev/null 2>&1 || { echo "aws CLI is not installed on EC2"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker is not installed on EC2"; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "git is not installed on EC2"; exit 1; }

          if [ ! -d "$REPO_DIR/.git" ]; then
            rm -rf "$REPO_DIR"
            git -c http.extraHeader="Authorization: Basic $GIT_AUTH" clone -b "$BRANCH_NAME" "$REPO_URL" "$REPO_DIR"
          else
            cd "$REPO_DIR"
            git remote set-url origin "$REPO_URL"
            git -c http.extraHeader="Authorization: Basic $GIT_AUTH" fetch origin "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"
          fi

          cd "$REPO_DIR"

          aws ecr get-login-password --region "$AWS_REGION" | sudo docker login --username AWS --password-stdin "$REGISTRY"

          sudo docker build -t "ecr-fe:$IMAGE_TAG" -f hospital_FE/Dockerfile hospital_FE
          sudo docker build -t "ecr-be:$IMAGE_TAG" -f hospital_BE/Hospital_API/Dockerfile hospital_BE/Hospital_API

          sudo docker tag "ecr-fe:$IMAGE_TAG" "$REGISTRY/ecr-fe:$IMAGE_TAG"
          sudo docker tag "ecr-be:$IMAGE_TAG" "$REGISTRY/ecr-be:$IMAGE_TAG"

          sudo docker push "$REGISTRY/ecr-fe:$IMAGE_TAG"
          sudo docker push "$REGISTRY/ecr-be:$IMAGE_TAG"
          EOF

      - name: Checkout repo to update manifests
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Update image tag in k8s manifests
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s|image: .*ecr-fe:.*|image: ${REGISTRY}/ecr-fe:${IMAGE_TAG}|g" "$FE_MANIFEST"
          sed -i "s|image: .*ecr-be:.*|image: ${REGISTRY}/ecr-be:${IMAGE_TAG}|g" "$BE_MANIFEST"

      - name: Commit and push updated manifests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FE_MANIFEST" "$BE_MANIFEST"

          if git diff --cached --quiet; then
            echo "No manifest image tag changes to commit."
            exit 0
          fi

          git commit -m "ci: update image tag to ${IMAGE_TAG}"
          git push origin "$BRANCH_NAME"
