apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hospital-traefik-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kien-devops/eks-cicd-argocd-sec-monitor.git
    targetRevision: devops
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: hospital
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
