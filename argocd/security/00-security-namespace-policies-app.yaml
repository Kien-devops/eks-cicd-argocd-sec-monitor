apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-namespace-policies
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kien-devops/eks-cicd-argocd-sec-monitor.git
    targetRevision: main
    path: k8s/security
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

