apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: "3.3.7"
    helm:
      releaseName: kyverno
      values: |
        crds:
          install: true
          migration:
            enabled: false

        webhooksCleanup:
          enabled: false

        policyReportsCleanup:
          enabled: false

        admissionController:
          replicas: 1

        backgroundController:
          replicas: 1

        cleanupController:
          replicas: 1

        reportsController:
          replicas: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: security

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true